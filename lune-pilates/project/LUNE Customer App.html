<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>LUNE Pilates — Customer App</title>
<meta name="ext-resource-dependency" content="assets/studio-hero.jpg" data-resource-id="studioHero" />
<meta name="ext-resource-dependency" content="assets/studio-equipment.jpg" data-resource-id="studioEquip" />
<template id="__bundler_thumbnail" data-bg-color="#F1E9E0">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F1E9E0"/>
    <text x="600" y="400" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="150" letter-spacing="34" fill="#8C7A63">LUN<tspan>E</tspan></text>
    <path d="M820 372 q5 28 33 33 q-28 5 -33 33 q-5 -28 -33 -33 q28 -5 33 -33 z" fill="#8C7A63"/>
    <text x="600" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="34" letter-spacing="16" fill="#8C7A63">PILATES STUDIO</text>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Schibsted+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Trirong:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #DAD2C7;
    font-family: 'Hanken Grotesk', 'IBM Plex Sans Thai', system-ui, sans-serif;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .lune-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body style="font-family: system-ui">
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="lune-data.jsx"></script>
<script type="text/babel" src="lune-icons.jsx"></script>
<script type="text/babel" src="lune-ui.jsx"></script>
<script type="text/babel" src="lune-home.jsx"></script>
<script type="text/babel" src="lune-schedule.jsx"></script>
<script type="text/babel" src="lune-sheets.jsx"></script>
<script type="text/babel" src="lune-detail.jsx"></script>
<script type="text/babel" src="lune-credits.jsx?v=2"></script>
<script type="text/babel" src="lune-extra.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "language": "th",
  "accent": "#8C7A63",
  "colorTemp": "warm",
  "radius": "soft",
  "density": "airy",
  "headingFont": "Schibsted"
}/*EDITMODE-END*/;

const TABS = ['home', 'schedule', 'bookings', 'profile'];

function App({ tw, setTweak }) {
  const lang = tw.language === 'en' ? 'en' : 'th';
  const T = makeT(lang);

  const [stack, setStack] = useState(['home']);
  const [selected, setSelected] = useState('s1');
  const [credits, setCredits] = useState(USER.credits);
  const screen = stack[stack.length - 1];
  const scrollRef = useRef(null);

  // reset scroll on screen change
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [screen]);

  const go = (key) => {
    if (TABS.includes(key)) setStack([key]);
    else setStack((s) => (s[s.length - 1] === key ? s : [...s, key]));
  };
  const openClass = (id) => { setSelected(id); setStack((s) => [...s, 'detail']); };
  const back = () => setStack((s) => (s.length > 1 ? s.slice(0, -1) : s));
  const book = (cost) => setCredits((c) => Math.round((c - cost) * 10) / 10);
  const addCredits = (h) => setCredits((c) => Math.round((c + h) * 10) / 10);
  const setLang = (l) => setTweak('language', l);

  const ctx = {
    ...T, setLang, screen, go, back, openClass, selected,
    credits, book, addCredits,
  };

  const isTab = TABS.includes(screen);
  const isPushed = screen === 'detail' || screen === 'credits';

  return (
    <LuneCtx.Provider value={ctx}>
      <div style={{ ...themeVars(tw), width: '100%', height: '100%', background: 'var(--cream)', display: 'flex', flexDirection: 'column', fontFamily: 'var(--font-body)', color: 'var(--ink)' }}>
        {screen === 'detail' && <ClassDetail key={selected} />}
        {screen === 'credits' && <CreditsScreen />}
        {isTab && (
          <>
            <Header />
            <main ref={scrollRef} className="lune-scroll" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', background: 'var(--cream)' }}>
              {screen === 'home' && <HomeScreen />}
              {screen === 'schedule' && <ScheduleScreen />}
              {screen === 'bookings' && <BookingsScreen />}
              {screen === 'profile' && <ProfileScreen />}
            </main>
            <BottomNav />
          </>
        )}
      </div>
    </LuneCtx.Provider>
  );
}

// device + responsive scaler + tweaks (unscaled)
function Root() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const wrapRef = useRef(null);
  useEffect(() => {
    const fit = () => {
      const el = wrapRef.current; if (!el) return;
      const pad = 32;
      const s = Math.min(1, (window.innerWidth - pad) / 402, (window.innerHeight - pad) / 874);
      el.style.transform = `scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
  return (
    <>
      <div ref={wrapRef} style={{ transformOrigin: 'center center' }}>
        <IOSDevice>
          <App tw={tw} setTweak={setTweak} />
        </IOSDevice>
      </div>
      <TweaksPanel>
        <TweakSection label="Brand & color" />
        <TweakColor label="Accent" value={tw.accent} options={['#8C7A63', '#9B8466', '#7E8C72', '#A9836B']} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Warmth" value={tw.colorTemp} options={['warm', 'cool']} onChange={(v) => setTweak('colorTemp', v)} />
        <TweakSection label="Type & shape" />
        <TweakSelect label="Heading font" value={tw.headingFont} options={['Schibsted', 'Hanken', 'Cormorant', 'Fraunces']} onChange={(v) => setTweak('headingFont', v)} />
        <TweakRadio label="Corners" value={tw.radius} options={['soft', 'rounded', 'sharp']} onChange={(v) => setTweak('radius', v)} />
        <TweakRadio label="Density" value={tw.density} options={['airy', 'regular', 'compact']} onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Language" />
        <TweakRadio label="Default" value={tw.language} options={['th', 'en']} onChange={(v) => setTweak('language', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
